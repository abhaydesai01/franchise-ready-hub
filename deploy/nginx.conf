# Nginx config for Franchise Ready Hub (single EC2 instance)
# Place at: /etc/nginx/sites-available/franchise
# Enable:   sudo ln -s /etc/nginx/sites-available/franchise /etc/nginx/sites-enabled/franchise

# ── Admin SPA + NestJS API (port 80) ─────────────────────────────────────────
server {
    listen 80;
    server_name _;   # matches any hostname / bare IP

    # Vite SPA — serve built static files
    root /home/ubuntu/franchise-ready-hub/dist;
    index index.html;

    # SPA fallback: unknown paths go to index.html (React Router handles them)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # NestJS API
    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 120s;
    }
}

# ── Next.js CRM (port 3000 — access via http://<IP>:3000) ────────────────────
