# Nginx config for Franchise Ready Hub (single EC2 instance)
# Place at: /etc/nginx/sites-available/franchise
# Enable:   sudo ln -s /etc/nginx/sites-available/franchise /etc/nginx/sites-enabled/franchise

# ── All services on port 80 ───────────────────────────────────────────────────
server {
    listen 80;
    server_name _;

    # Freddy bot WhatsApp webhook — Meta requires HTTPS (via Cloudflare tunnel)
    # Meta webhook URL: https://your-tunnel.trycloudflare.com/freddy/webhook
    location /freddy/ {
        rewrite ^/freddy/(.*)$ /$1 break;
        proxy_pass         http://127.0.0.1:5001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # NestJS API
    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 120s;
    }

    # Vite SPA — serve built static files (must be last)
    root /home/ubuntu/franchise-ready-hub/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}

